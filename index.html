
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitCoinX - Tap to Earn</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            margin-top: 30px;
        }
        .balance {
            font-size: 45px;
            font-weight: bold;
            color: #f59e0b;
            margin-top: 10px;
        }
        .coin-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }
        .coin {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #f59e0b, #d97706);
            border-radius: 50%;
            box-shadow: 0 0 40px #f59e0b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.05s ease;
        }
        .coin:active {
            transform: scale(0.92);
        }
        .tasks-container {
            background-color: #1e293b;
            width: 100%;
            border-radius: 25px 25px 0 0;
            padding: 25px;
            box-sizing: border-box;
        }
        .task-btn {
            background-color: #334155;
            color: white;
            border: none;
            padding: 15px 20px;
            margin: 10px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>BitCoinX Balance</h2>
        <div class="balance" id="score">0</div>
    </div>

    <div class="coin-container">
        <div class="coin" id="coinBtn">₿</div>
    </div>

    <div class="tasks-container">
        <h3 style="margin-top: 0;">Earn Extra Coins</h3>
        <button class="task-btn" onclick="watchAd('https://google.com', 500)">Watch Video Ad (+500 Coins)</button>
        <button class="task-btn" onclick="watchAd('https://google.com', 1000)">Join Telegram Channel (+1000 Coins)</button>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('btc_score')) || 0;
        document.getElementById('score').innerText = score;

        const coinBtn = document.getElementById('coinBtn');
        coinBtn.addEventListener('click', () => {
            score += 1;
            document.getElementById('score').innerText = score;
            localStorage.setItem('btc_score', score);
        });

        function watchAd(adLink, reward) {
            window.open(adLink, '_blank');
            score += reward;
            document.getElementById('score').innerText = score;
            localStorage.setItem('btc_score', score);
        }
    </script>

</body>
</html>
