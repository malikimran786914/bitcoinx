

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitCoinX - Test</title>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
        }
        .balance {
            font-size: 36px;
            font-weight: bold;
            color: #f59e0b;
            margin-bottom: 30px;
            font-family: monospace;
        }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #fcd34d 0%, #f59e0b 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 90px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.05s;
        }
        .coin:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2>BitCoinX Test Balance</h2>
    <div class="balance" id="scoreDisplay">0.00000000</div>

    <div class="coin" id="coinBtn">₿</div>

    <script>
        let score = parseFloat(localStorage.getItem('test_score')) || 0.0;
        document.getElementById('scoreDisplay').innerText = score.toFixed(8);

        const coinBtn = document.getElementById('coinBtn');
        
        // Touch devices ke liye handle
        coinBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            score += 0.00000001;
            document.getElementById('scoreDisplay').innerText = score.toFixed(8);
            localStorage.setItem('test_score', score);
        });

        // Click handler (agar browser me check karein)
        coinBtn.addEventListener('click', () => {
            score += 0.00000001;
            document.getElementById('scoreDisplay').innerText = score.toFixed(8);
            localStorage.setItem('test_score', score);
        });
    </script>

</body>
</html>
